<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shri Shyam Fast Food - Thermal Invoice</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace; /* Standard Bill Font */
            margin: 10px;
            background-color: #f0f0f0;
            color: #000;
            font-size: 12px;
        }
        /* Bill container size adjusted for 3-inch (80mm) Thermal Roll */
        .invoice-box {
            max-width: 280px;
            margin: auto;
            background: #fff;
            padding: 10px;
            border: 1px dashed #999;
        }
        .header {
            text-align: center;
            margin-bottom: 10px;
        }
        .header h2 {
            margin: 0 0 5px 0;
            font-size: 16px;
            text-transform: uppercase;
        }
        .header p {
            margin: 2px 0;
            font-size: 11px;
        }
        .dashed-line {
            border-top: 1px dashed #000;
            margin: 8px 0;
        }
        .info-table, .item-table, .total-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
        }
        .info-table td {
            padding: 2px 0;
        }
        .item-table th {
            text-align: left;
            border-bottom: 1px dashed #000;
            padding-bottom: 5px;
        }
        .item-table td {
            padding: 4px 0;
            vertical-align: top;
        }
        .text-right { text-align: right; }
        .text-center { text-align: center; }
        
        .total-table td {
            padding: 2px 0;
        }

        /* Input Form styling (Yeh print me nahi dikhega) */
        .input-form {
            max-width: 280px;
            margin: 10px auto;
            background: #fff;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        .input-form h3 { margin-top: 0; font-family: sans-serif; font-size: 14px; }
        .input-form input, .input-form select {
            width: 100%;
            padding: 6px;
            margin-bottom: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn {
            width: 100%;
            padding: 8px;
            background: #e67e22;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 5px;
        }
        .btn-print { background: #27ae60; }
        .btn-danger { background: #c0392b; width: auto; padding: 2px 5px; font-size: 9px; color: #fff; border: none; cursor: pointer; }

        /* Print Settings: Sirf lamba bill print hoga, baaki sab gayab */
        @media print {
            body { background: #fff; margin: 0; padding: 0; }
            .invoice-box { border: none; max-width: 100%; padding: 0; }
            .input-form, .btn-danger, .action-col { display: none !important; }
            @page {
                size: auto;
                margin: 0mm;
            }
        }
    </style>
</head>
<body>

<div class="input-form">
    <h3>Add Item to Bill</h3>
    <input type="text" id="custName" placeholder="Customer Name" value="Cash Bill">
    <input type="text" id="itemName" placeholder="Item Name (e.g., Momo)">
    <input type="number" id="itemRate" placeholder="Rate (₹)">
    <input type="number" id="itemQty" placeholder="Quantity" value="1">
    <select id="itemGst">
        <option value="5">5% GST</option>
        <option value="12">12% GST</option>
        <option value="18" selected>18% GST</option>
        <option value="0">0% GST</option>
    </select>
    <button class="btn" onclick="addItem()">+ Add Item</button>
    <button class="btn btn-print" onclick="saveAndPrint()">Save & Print Bill</button>
</div>

<div class="invoice-box">
    <div class="header">
        <h2>Shri Shyam Fast Food</h2>
        <p>Main Market, Near Temple, City</p>
        <p>GSTIN: 07AAAAA1111A1Z1</p>
        <p>Mob: +91 9876543210</p>
    </div>

    <div class="dashed-line"></div>

    <table class="info-table">
        <tr>
            <td><strong>Inv No:</strong> <span id="invNo"></span></td>
            <td class="text-right"><strong>Date:</strong> <span id="invDate"></span></td>
        </tr>
        <tr>
            <td colspan="2"><strong>Cust:</strong> <span id="lblCustName">Cash Bill</span></td>
        </tr>
    </table>

    <div class="dashed-line"></div>

    <table class="item-table">
        <thead>
            <tr>
                <th style="width: 45%;">Item</th>
                <th class="text-right" style="width: 15%;">Qty</th>
                <th class="text-right" style="width: 20%;">Rate</th>
                <th class="text-right" style="width: 20%;">Total</th>
                <th class="action-col text-center" style="width: 10%;">X</th>
            </tr>
        </thead>
        <tbody id="billItems">
            </tbody>
    </table>

    <div class="dashed-line"></div>

    <table class="total-table">
        <tr>
            <td>Sub Total:</td>
            <td class="text-right">₹<span id="subTotal">0.00</span></td>
        </tr>
        <tr>
            <td>CGST Total:</td>
            <td class="text-right">₹<span id="cgstTotal">0.00</span></td>
        </tr>
        <tr>
            <td>SGST Total:</td>
            <td class="text-right">₹<span id="sgstTotal">0.00</span></td>
        </tr>
        <tr style="font-weight: bold; font-size: 13px;">
            <td>GRAND TOTAL:</td>
            <td class="text-right">₹<span id="grandTotal">0.00</span></td>
        </tr>
    </table>

    <div class="dashed-line"></div>
    <p class="text-center" style="margin: 5px 0 0 0; font-size: 10px;">Thank You! Visit Again.</p>
</div>

<script>
    // Date & Bill No setting
    document.getElementById('invDate').innerText = new Date().toLocaleDateString('en-IN');
    document.getElementById('invNo').innerText = 'SS-' + Math.floor(1000 + Math.random() * 9000);

    // Live customer name change
    document.getElementById('custName').addEventListener('input', function() {
        document.getElementById('lblCustName').innerText = this.value || 'Cash Bill';
    });

    let basket = [];

    function addItem() {
        const name = document.getElementById('itemName').value;
        const rate = parseFloat(document.getElementById('itemRate').value);
        const qty = parseInt(document.getElementById('itemQty').value);
        const gst = parseFloat(document.getElementById('itemGst').value);

        if (!name || isNaN(rate) || isNaN(qty) || qty <= 0 || rate <= 0) {
            alert("Kripya sahi detail bharein!");
            return;
        }

        const total = rate * qty;
        const gstAmt = (total * gst) / 100;
        const finalAmt = total + gstAmt;

        basket.push({
            id: Date.now(),
            name, qty, rate, gst, total, gstAmt, finalAmt
        });

        renderBill();
        
        // Input fields reset
        document.getElementById('itemName').value = '';
        document.getElementById('itemRate').value = '';
        document.getElementById('itemQty').value = '1';
    }

    function deleteItem(id) {
        basket = basket.filter(x => x.id !== id);
        renderBill();
    }

    function renderBill() {
        const tbody = document.getElementById('billItems');
        tbody.innerHTML = '';
        
        let subTotal = 0;
        let totalGst = 0;
        let grandTotal = 0;

        basket.forEach(item => {
            subTotal += item.total;
            totalGst += item.gstAmt;
            grandTotal += item.finalAmt;

            tbody.innerHTML += `
                <tr>
                    <td>${item.name}<br><small style="font-size:9px;color:#555;">GST ${item.gst}%</small></td>
                    <td class="text-right">${item.qty}</td>
                    <td class="text-right">${item.rate.toFixed(2)}</td>
                    <td class="text-right">${item.finalAmt.toFixed(2)}</td>
                    <td class="action-col text-center">
                        <button class="btn-danger" onclick="deleteItem(${item.id})">x</button>
                    </td>
                </tr>
            `;
        });

        document.getElementById('subTotal').innerText = subTotal.toFixed(2);
        document.getElementById('cgstTotal').innerText = (totalGst / 2).toFixed(2);
        document.getElementById('sgstTotal').innerText = (totalGst / 2).toFixed(2);
        document.getElementById('grandTotal').innerText = Math.round(grandTotal).toFixed(2);
    }

    function saveAndPrint() {
        if (basket.length === 0) {
            alert("Bill khali hai!");
            return;
        }
        window.print();
    }
</script>

</body>
</html>
