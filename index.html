<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shri Shyam Fast Food - JIS B8 Bill</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 4px;
            background-color: #f4f4f4; color: #000;
            font-size: 7.5pt; /* Chote paper ke liye compact font */
            line-height: 1.1;
        }

        /* Entry Form Panel (Sirf Screen par dikhega) */
        .setup-box {
            max-width: 260px; margin: 5px auto;
            background: #fff; padding: 10px;
            border-radius: 6px; border: 1px solid #ccc;
            font-family: Arial, sans-serif; font-size: 11px;
        }
        .setup-box input, .setup-box select {
            width: 100%; padding: 5px; margin-bottom: 6px; border: 1px solid #ddd; border-radius: 4px;
        }
        .btn {
            width: 100%; padding: 8px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: white;
        }
        .btn-add { background: #e67e22; margin-bottom: 4px; }
        .btn-print { background: #27ae60; font-size: 12px; }
        .btn-del { background: #c0392b; color: white; border: none; padding: 1px 4px; cursor: pointer; font-size: 8px; }

        /* STRICT JIS B8 SIZE BLOCK (64mm Width) */
        .b8-receipt {
            width: 58mm; /* 64mm paper size me safely fit hone ke liye printable width */
            margin: 10px auto;
            background: #fff;
            padding: 1mm;
            border: 1px dashed #bbb;
        }
        
        .center { text-align: center; }
        .right { text-align: right; }
        .bold { font-weight: bold; }
        .brand { font-size: 10pt; font-weight: bold; text-transform: uppercase; margin: 0; }
        .shop-info { font-size: 6.5pt; margin: 0.5mm 0; }
        .divider { border-top: 1px dashed #000; margin: 1.5mm 0; }
        
        table { width: 100%; border-collapse: collapse; font-size: 7.5pt; }
        th { border-bottom: 1px dashed #000; padding-bottom: 0.5mm; text-align: left; font-weight: bold; }
        td { padding: 1mm 0; vertical-align: top; }
        
        .total-table { width: 100%; font-size: 7.5pt; margin-top: 1mm; }
        .total-table td { padding: 0.5mm 0; }
        .grand-row { font-size: 8.5pt; font-weight: bold; }
        .grand-line { border-top: 1px dashed #000; border-bottom: 1px dashed #000; padding: 1mm 0; }

        /* JIS B8 DIRECT PRINT SETTINGS */
        @media print {
            @page {
                size: 64mm auto; /* Locks width to exact JIS B8 width, height automatically adjusts */
                margin: 0mm !important;
            }
            body { background: #fff; padding: 0; margin: 0; }
            .setup-box, .action-col, .btn-del { display: none !important; }
            .b8-receipt { border: none; width: 100% !important; padding: 1mm; margin: 0; }
        }
    </style>
</head>
<body>

<div class="setup-box">
    <strong style="display:block; text-align:center; margin-bottom:5px;">Shri Shyam Fast Food</strong>
    <input type="text" id="custName" placeholder="Customer Name" value="Cash Bill">
    <input type="text" id="itemName" placeholder="Item Name (e.g. Momo)">
    <div style="display: flex; gap: 4px;">
        <input type="number" id="itemRate" placeholder="Rate (₹)">
        <input type="number" id="itemQty" placeholder="Qty" value="1">
    </div>
    <select id="itemGst">
        <option value="5" selected>5% GST</option>
        <option value="12">12% GST</option>
        <option value="18">18% GST</option>
        <option value="0">0% GST</option>
    </select>
    <button class="btn btn-add" onclick="addItem()">+ Add Item</button>
    <button class="btn btn-print" onclick="printBill()">🖨️ Direct Print (JIS B8)</button>
</div>

<!-- JIS B8 Tiny Receipt Box -->
<div class="b8-receipt">
    <div class="center">
        <div class="brand">Shri Shyam Fast Food</div>
        <div class="shop-info">Main Market, City</div>
        <div class="shop-info">GSTIN: 07AAAAA1111A1Z1 | Mob: 9876543210</div>
    </div>
    
    <div class="divider"></div>
    
    <table style="font-size: 6.5pt;">
        <tr>
            <td>No: <span id="bNo"></span></td>
            <td class="right">Dt: <span id="bDate"></span></td>
        </tr>
        <tr>
            <td colspan="2">Cust: <span id="lCust">Cash Bill</span></td>
        </tr>
    </table>
    
    <div class="divider"></div>
    
    <table>
        <thead>
            <tr>
                <th style="width: 55%;">Item</th>
                <th class="right" style="width: 15%;">Qty</th>
                <th class="right" style="width: 30%;">Total</th>
                <th class="action-col center" style="width: 10%;">X</th>
            </tr>
        </thead>
        <tbody id="itemList"></tbody>
    </table>
    
    <div class="divider"></div>
    
    <table class="total-table">
        <tr>
            <td style="width: 60%;" class="right">Sub Tot:</td>
            <td class="right">₹<span id="subTotal">0.00</span></td>
        </tr>
        <tr>
            <td class="right">Tax (GST):</td>
            <td class="right">₹<span id="taxTotal">0.00</span></td>
        </tr>
        <tr class="grand-row">
            <td class="right grand-line">NET TOTAL:</td>
            <td class="right grand-line">₹<span id="netTotal">0.00</span></td>
        </tr>
    </table>
    
    <div class="center" style="margin-top: 3mm; font-size: 6.5pt;">Thank You! Visit Again.</div>
</div>

<script>
    document.getElementById('bDate').innerText = new Date().toLocaleDateString('en-IN');
    document.getElementById('bNo').innerText = 'SS-' + Math.floor(100 + Math.random() * 900);
    document.getElementById('custName').addEventListener('input', function() {
        document.getElementById('lCust').innerText = this.value || 'Cash Bill';
    });

    let b8Cart = [];

    function addItem() {
        const name = document.getElementById('itemName').value;
        const rate = parseFloat(document.getElementById('itemRate').value);
        const qty = parseInt(document.getElementById('itemQty').value);
        const gst = parseFloat(document.getElementById('itemGst').value);

        if (!name || isNaN(rate) || isNaN(qty)) { alert("Sahi details dalein!"); return; }

        const total = rate * qty;
        const gstVal = (total * gst) / 100;
        const net = total + gstVal;

        b8Cart.push({ id: Date.now(), name, qty, total, gstVal, net });
        renderB8Table();
        
        document.getElementById('itemName').value = '';
        document.getElementById('itemRate').value = '';
        document.getElementById('itemQty').value = '1';
    }

    function removeRow(id) {
        b8Cart = b8Cart.filter(x => x.id !== id);
        renderB8Table();
    }

    function renderB8Table() {
        const tbody = document.getElementById('itemList');
        tbody.innerHTML = '';
        let st = 0, gt = 0, nt = 0;

        b8Cart.forEach(i => {
            st += i.total; gt += i.gstVal; nt += i.net;
            tbody.innerHTML += `
                <tr>
                    <td>${i.name}</td>
                    <td class="right">${i.qty}</td>
                    <td class="right">${i.net.toFixed(2)}</td>
                    <td class="action-col center"><button class="btn-del" onclick="removeRow(${i.id})">x</button></td>
                </tr>`;
        });

        document.getElementById('subTotal').innerText = st.toFixed(2);
        document.getElementById('taxTotal').innerText = gt.toFixed(2);
        document.getElementById('netTotal').innerText = Math.round(nt).toFixed(2);
    }

    function printBill() {
        if (b8Cart.length === 0) { alert("Pehle item add karein!"); return; }
        window.print();
    }
</script>

</body>
</html>
