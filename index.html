<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santa Banta Bakery | Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --maroon: #4a1010; --orange: #ff8c00; }
        .bg-maroon { background-color: var(--maroon); }
        .text-orange { color: var(--orange); }
        .border-orange { border-color: var(--orange); }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-item { animation: slideUp 0.4s ease forwards; }
    </style>
</head>
<body class="bg-gray-100 font-sans leading-relaxed">

    <!-- View Toggle (For Development) -->
    <div class="fixed bottom-4 left-4 z-[100] flex gap-2">
        <button onclick="switchView('user')" class="bg-black text-white px-3 py-1 rounded-full text-xs">Customer View</button>
        <button onclick="switchView('login')" class="bg-black text-white px-3 py-1 rounded-full text-xs">Admin Panel</button>
    </div>

    <!-- CUSTOMER INTERFACE -->
    <div id="user-view" class="view">
        <header class="bg-maroon text-white sticky top-0 z-50 p-4 shadow-xl">
            <div class="container mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-orange rounded-full flex items-center justify-center font-bold">SB</div>
                    <h1 class="text-xl font-black tracking-tighter">SANTA BANTA</h1>
                </div>
                <button onclick="toggleCart()" class="bg-white/10 p-2 rounded-xl relative">
                    <i class="fa-solid fa-bag-shopping text-orange text-xl"></i>
                    <span id="cart-badge" class="absolute -top-2 -right-2 bg-orange text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center border-2 border-maroon">0</span>
                </button>
            </div>
        </header>

        <main class="container mx-auto p-4 mb-24">
            <div id="menu-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Items injected here -->
            </div>
        </main>

        <!-- Cart Sidebar -->
        <div id="cart-panel" class="fixed inset-y-0 right-0 w-full md:w-96 glass shadow-2xl translate-x-full transition-transform duration-500 z-[60] flex flex-col">
            <div class="p-6 bg-maroon text-white flex justify-between">
                <h2 class="font-bold uppercase tracking-widest">Your Order</h2>
                <button onclick="toggleCart()"><i class="fa-solid fa-x"></i></button>
            </div>
            <div id="cart-list" class="flex-grow p-6 overflow-y-auto space-y-4 text-gray-600"></div>
            <div class="p-6 border-t bg-white">
                <div class="flex justify-between font-black text-xl mb-4"><span>Total</span><span id="cart-total">₹0</span></div>
                <button onclick="sendOrderToFirebase()" class="w-full bg-maroon text-orange py-4 rounded-2xl font-black uppercase tracking-widest hover:brightness-125 transition active:scale-95">Place Order</button>
            </div>
        </div>
    </div>

    <!-- ADMIN LOGIN -->
    <div id="login-view" class="view hidden fixed inset-0 bg-maroon flex items-center justify-center p-6 z-[80]">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md text-center">
            <h2 class="text-2xl font-black mb-6">ADMIN LOGIN</h2>
            <input type="text" id="admin-user" placeholder="Admin ID" class="w-full p-4 border rounded-2xl mb-4 focus:outline-orange">
            <input type="password" id="admin-pass" placeholder="Password" class="w-full p-4 border rounded-2xl mb-6 focus:outline-orange">
            <button onclick="checkLogin()" class="w-full bg-orange text-white py-4 rounded-2xl font-bold">ACCESS PANEL</button>
        </div>
    </div>

    <!-- ADMIN DASHBOARD -->
    <div id="admin-view" class="view hidden bg-gray-50 min-h-screen">
        <nav class="bg-black text-white p-4 flex justify-between items-center">
            <span class="font-bold text-orange">SANTA BANTA ADMIN</span>
            <button onclick="switchView('user')" class="text-xs border border-gray-600 px-3 py-1 rounded">Logout</button>
        </nav>
        <div class="p-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-3xl shadow-sm border-b-4 border-orange">
                    <p class="text-gray-400 text-sm">New Orders</p>
                    <h3 class="text-3xl font-black" id="admin-new-count">0</h3>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border-b-4 border-green-500">
                    <p class="text-gray-400 text-sm">Revenue</p>
                    <h3 class="text-3xl font-black" id="admin-revenue">₹0</h3>
                </div>
            </div>
            <h3 class="font-bold text-xl mb-4">Live Order Stream</h3>
            <div id="order-stream" class="space-y-4 text-gray-700">
                <div class="bg-white p-8 rounded-3xl text-center border-2 border-dashed">Waiting for new orders...</div>
            </div>
        </div>
    </div>

    <script>
        const menu = [
            { name: "Aalu Patties", price: 30, cat: "PATTIES" },
            { name: "Paneer Pizza", price: 180, cat: "PIZZA" },
            { name: "Chilli Paneer", price: 160, cat: "CHINESE" },
            { name: "Kit Kat Shake", price: 120, cat: "BEVERAGE" },
            { name: "Choco Lava", price: 90, cat: "PASTRY" }
        ];

        let cart = [];
        let orders = [];

        function switchView(viewName) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(viewName + '-view').classList.remove('hidden');
        }

        function checkLogin() {
            const user = document.getElementById('admin-user').value;
            const pass = document.getElementById('admin-pass').value;
            if(user === "santabanta" && pass === "9873") {
                switchView('admin');
                renderAdmin();
            } else {
                alert("Incorrect Credentials");
            }
        }

        function renderMenu() {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = menu.map((item, index) => `
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-gray-100 flex justify-between items-center animate-item" style="animation-delay: ${index * 0.1}s">
                    <div>
                        <span class="text-[10px] font-bold text-orange">${item.cat}</span>
                        <h4 class="font-bold text-gray-800">${item.name}</h4>
                        <p class="font-black text-maroon">₹${item.price}</p>
                    </div>
                    <button onclick="addToCart('${item.name}', ${item.price})" class="w-12 h-12 bg-maroon text-orange rounded-2xl flex items-center justify-center active:scale-90 transition shadow-lg"><i class="fa-solid fa-plus"></i></button>
                </div>
            `).join('');
        }

        function addToCart(name, price) {
            cart.push({ name, price, id: Date.now() });
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-badge').innerText = cart.length;
            const list = document.getElementById('cart-list');
            list.innerHTML = cart.map(i => `<div class="flex justify-between border-b pb-2"><span>${i.name}</span><b>₹${i.price}</b></div>`).join('');
            const total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('cart-total').innerText = '₹' + total;
        }

        function toggleCart() { document.getElementById('cart-panel').classList.toggle('translate-x-full'); }

        function sendOrderToFirebase() {
            if(cart.length === 0) return;
            const newOrder = {
                id: Math.floor(Math.random()*10000),
                items: [...cart],
                total: cart.reduce((s, i) => s + i.price, 0),
                time: new Date().toLocaleTimeString()
            };
            orders.unshift(newOrder);
            alert("Order Placed Successfully!");
            cart = [];
            updateCartUI();
            toggleCart();
        }

        function renderAdmin() {
            const stream = document.getElementById('order-stream');
            const rev = orders.reduce((s, o) => s + o.total, 0);
            document.getElementById('admin-new-count').innerText = orders.length;
            document.getElementById('admin-revenue').innerText = '₹' + rev;

            stream.innerHTML = orders.map(o => `
                <div class="bg-white p-6 rounded-3xl shadow-sm border-l-8 border-orange flex justify-between items-center animate-item">
                    <div>
                        <p class="text-xs text-gray-400">Order #${o.id} • ${o.time}</p>
                        <p class="font-bold">${o.items.map(i => i.name).join(', ')}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-lg">₹${o.total}</p>
                        <button class="bg-green-100 text-green-600 text-[10px] px-2 py-1 rounded-full font-bold">READY TO PACK</button>
                    </div>
                </div>
            `).join('');
        }

        function init() {
            renderMenu();
            // In a real app, you would use firebase.firestore().onSnapshot() here to sync orders live.
            setInterval(renderAdmin, 2000); 
        }

        window.onload = init;
    </script>
</body>
</html>
