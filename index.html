<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shri Shyam Fast Food - Thermal Bill</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 10px;
            background-color: #f4f4f4; color: #000;
        }
        
        /* Input section only for screen */
        .setup-box {
            max-width: 300px; margin: 10px auto;
            background: #fff; padding: 15px;
            border-radius: 8px; border: 1px solid #ccc;
            font-family: Arial, sans-serif;
        }
        .setup-box h3 { margin: 0 0 10px 0; font-size: 15px; text-align: center; color: #2c3e50; }
        .setup-box input, .setup-box select {
            width: 100%; padding: 7px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 4px;
        }
        .btn {
            width: 100%; padding: 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 14px;
        }
        .btn-add { background: #e67e22; color: white; margin-bottom: 5px; }
        .btn-print { background: #27ae60; color: white; }
        .btn-del { background: #c0392b; color: white; border: none; padding: 2px 6px; cursor: pointer; font-size: 10px; }

        /* Locked 80mm / 3-inch Thermal Bill Box */
        .pos-receipt {
            width: 72mm; /* Standard printable width for 80mm rolls */
            margin: 0 auto; background: #ffffff; padding: 2mm;
            border: 1px dashed #bbb;
        }
        .center { text-align: center; }
        .right { text-align: right; }
        .brand-name { font-size: 13pt; font-weight: bold; text-transform: uppercase; margin: 0; }
        .shop-info { font-size: 8pt; margin: 1mm 0; }
        .dashed-divider { border-top: 1px dashed #000; margin: 2mm 0; }
        
        .bill-table { width: 100%; border-collapse: collapse; font-size: 8.5pt; }
        .bill-table th { border-bottom: 1px dashed #000; padding-bottom: 1mm; text-align: left; font-weight: bold; }
        .bill-table td { padding: 1.5mm 0; vertical-align: top; }
        .item-gst-lbl { font-size: 7.5pt; color: #444; }
        
        .total-table { width: 85%; margin-left: 15%; border-collapse: collapse; font-size: 8.5pt; }
        .total-table td { padding: 0.8mm 0; }
        .grand-total-row { font-weight: bold; font-size: 9.5pt; }
        .grand-total-td { border-top: 1px dashed #000; border-bottom: 1px dashed #000; padding: 1.5mm 0; }

        /* STOPS BROWSER STRETCHING TO A4 */
        @media print {
            @page {
                size: 80mm auto !important; /* Force browser to crop page width at 80mm */
                margin: 0mm !important;
            }
            body { background: #fff; padding: 3mm; margin: 0; }
            .setup-box, .btn-del, .action-th, .action-td { display: none !important; }
            .pos-receipt { border: none; width: 100%; padding: 0; margin: 0; }
        }
    </style>
</head>
<body>

<div class="setup-box">
    <h3>Shri Shyam Fast Food</h3>
    <input type="text" id="custNameInput" placeholder="Customer Name" value="Cash Bill">
    <input type="text" id="itemName" placeholder="Item Name (e.g. Momo)">
    <input type="number" id="itemRate" placeholder="Rate (₹)">
    <input type="number" id="itemQty" placeholder="Qty" value="1">
    <select id="itemGst">
        <option value="5" selected>5% GST</option>
        <option value="12">12% GST</option>
        <option value="18">18% GST</option>
        <option value="0">0% GST</option>
    </select>
    <button class="btn btn-add" onclick="addNewItem()">+ Add Item</button>
    <button class="btn btn-print" onclick="triggerPrint()">Save & Print Bill</button>
</div>

<div class="pos-receipt">
    <div class="center">
        <div class="brand-name">Shri Shyam Fast Food</div>
        <div class="shop-info">Main Market, Near Temple, City</div>
        <div class="shop-info">GSTIN: 07AAAAA1111A1Z1</div>
        <div class="shop-info">Mob: +91 9876543210</div>
    </div>
    <div class="dashed-divider"></div>
    <table class="bill-table" style="font-size: 8pt;">
        <tr>
            <td><strong>Bill No:</strong> <span id="billNoId"></span></td>
            <td class="right"><strong>Date:</strong> <span id="billDateId"></span></td>
        </tr>
        <tr>
            <td colspan="2" style="padding-top: 0.5mm;"><strong>Cust:</strong> <span id="custNameLabel">Cash Bill</span></td>
        </tr>
    </table>
    <div class="dashed-divider"></div>
    <table class="bill-table">
        <thead>
            <tr>
                <th style="width: 50%;">Item</th>
                <th class="right" style="width: 12%;">Qty</th>
                <th class="right" style="width: 18%;">Rate</th>
                <th class="right" style="width: 20%;">Total</th>
                <th class="action-th center" style="width: 10%;">X</th>
            </tr>
        </thead>
        <tbody id="receiptItemsBody"></tbody>
    </table>
    <div class="dashed-divider"></div>
    <table class="total-table">
        <tr><td>Sub Total:</td><td class="right">₹<span id="subTotalLbl">0.00</span></td></tr>
        <tr><td>CGST Total:</td><td class="right">₹<span id="cgstTotalLbl">0.00</span></td></tr>
        <tr><td>SGST Total:</td><td class="right">₹<span id="sgstTotalLbl">0.00</span></td></tr>
        <tr class="grand-total-row">
            <td class="grand-total-td">NET TOTAL:</td>
            <td class="right grand-total-td">₹<span id="grandTotalLbl">0.00</span></td>
        </tr>
    </table>
    <div class="center" style="margin-top: 4mm; font-size: 8pt;">
        <p style="margin: 0;">Thank You! Visit Again.</p>
    </div>
</div>

<script>
    document.getElementById('billDateId').innerText = new Date().toLocaleDateString('en-IN');
    document.getElementById('billNoId').innerText = 'SS-' + Math.floor(1000 + Math.random() * 9000);
    document.getElementById('custNameInput').addEventListener('input', function() {
        document.getElementById('custNameLabel').innerText = this.value || 'Cash Bill';
    });

    let currentCart = [];
    function addNewItem() {
        const name = document.getElementById('itemName').value;
        const rate = parseFloat(document.getElementById('itemRate').value);
        const qty = parseInt(document.getElementById('itemQty').value);
        const gstPct = parseFloat(document.getElementById('itemGst').value);
        if (!name || isNaN(rate) || isNaN(qty) || qty <= 0 || rate <= 0) { alert("Details sahi bharein!"); return; }
        
        const totalValue = rate * qty;
        const gstCalculated = (totalValue * gstPct) / 100;
        const netValue = totalValue + gstCalculated;

        currentCart.push({ uniqueId: Date.now(), name, qty, rate, gstPct, totalValue, gstCalculated, netValue });
        refreshReceipt();
        document.getElementById('itemName').value = '';
        document.getElementById('itemRate').value = '';
        document.getElementById('itemQty').value = '1';
    }

    function removeItem(uId) {
        currentCart = currentCart.filter(item => item.uniqueId !== uId);
        refreshReceipt();
    }

    function refreshReceipt() {
        const tbody = document.getElementById('receiptItemsBody'); tbody.innerHTML = '';
        let sumSubTotal = 0, sumGst = 0, sumGrandTotal = 0;
        currentCart.forEach(item => {
            sumSubTotal += item.totalValue; sumGst += item.gstCalculated; sumGrandTotal += item.netValue;
            tbody.innerHTML += `<tr>
                <td>${item.name}<br><span class="item-gst-lbl">GST ${item.gstPct}%</span></td>
                <td class="right">${item.qty}</td>
                <td class="right">${item.rate.toFixed(2)}</td>
                <td class="right">${item.netValue.toFixed(2)}</td>
                <td class="action-td center"><button class="btn-del" onclick="removeItem(${item.uniqueId})">x</button></td>
            </tr>`;
        });
        document.getElementById('subTotalLbl').innerText = sumSubTotal.toFixed(2);
        document.getElementById('cgstTotalLbl').innerText = (sumGst / 2).toFixed(2);
        document.getElementById('sgstTotalLbl').innerText = (sumGst / 2).toFixed(2);
        document.getElementById('grandTotalLbl').innerText = Math.round(sumGrandTotal).toFixed(2);
    }

    function triggerPrint() {
        if (currentCart.length === 0) { alert("Items add kijiye!"); return; }
        window.print();
    }
</script>
</body>
</html>
